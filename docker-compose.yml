version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: academic-manager-sql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=DevPassword2024!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P DevPassword2024! -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - academic-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: academic-manager-web
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=AcademicManagerDB;User Id=sa;Password=DevPassword2024!;TrustServerCertificate=True;
    ports:
      - "5000:5000"
      - "5001:5001"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - academic-network

volumes:
  sqlserver_data:

networks:
  academic-network:
    driver: bridge
